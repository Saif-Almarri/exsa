# EXSA — Nginx security config
# Place in: /etc/nginx/sites-available/your-site
# Then: sudo ln -s /etc/nginx/sites-available/your-site /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com;
    root /var/www/html;

    # 1. Prevent directory listing
    autoindex off;

    # 2. Block hidden files (.git, .env, .htaccess)
    location ~ /\. {
        deny all;
        return 403;
    }

    # 3. Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self'" always;

    # 4. Block common exploit scanners (user-agent + query string)
    if ($http_user_agent ~* (libwww-perl|wget|python|nikto|curl|scan|java|winhttp|HTTrack|clshttp|loader|email|harvest|extract|grab|miner)) {
        return 403;
    }
    if ($query_string ~* "(<|%3C).*script.*(>|%3E)") {
        return 403;
    }

    # 5. Gzip compression for CSS/JS/HTML
    gzip on;
    gzip_types text/css application/javascript text/html image/svg+xml;
    gzip_min_length 256;

    # 6. Cache static assets (7 days)
    location ~* \.(css|js|svg|png|jpg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
